services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: nutriaid-frontend:prod
    container_name: nutriaid-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nutriaid-i.eu}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4028}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nutriaid-backend:prod
    container_name: nutriaid-backend
    environment:
      NODE_ENV: production
      PORT: 4028
    ports:
      - "4028:4028"
    restart: unless-stopped
